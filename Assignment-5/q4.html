<!doctype html>
<html>
  <head>
    <title>Product Inventory System</title>
    <link rel="stylesheet" href="q4.css" />
  </head>
  <body>
    <h2>Product Inventory System</h2>

    <div class="form-container">
      <input type="text" id="productId" placeholder="Product ID" />
      <input type="text" id="productName" placeholder="Name" />
      <input type="text" id="productCategory" placeholder="Category" />
      <input type="number" id="productPrice" placeholder="Price" />
      <input type="number" id="productStock" placeholder="Stock Quantity" />

      <button onclick="addProduct()">Add</button>
      <button onclick="updateProduct()">Update</button>
      <button onclick="deleteProduct()">Delete</button>
      <button onclick="loadProducts()">Load Products</button>
    </div>

    <div class="search-container">
      <input type="text" id="searchCategory" placeholder="Search by Category" />
      <button onclick="searchProduct()">Search</button>
      <button onclick="displayProducts()">Reset</button>
    </div>

    <p id="message"></p>

    <h3>Total Inventory Value: ₹ <span id="totalValue">0</span></h3>

    <table id="inventoryTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script src="q4.js"></script>
  </body>
</html>
