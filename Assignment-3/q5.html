<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Multi-Stage Workflow Engine</title>
    <link rel="stylesheet" href="q5.css" />
  </head>
  <body>
    <div class="workflow-container">
      <div class="progress-wrapper">
        <div id="progressBar" class="progress-bar"></div>
      </div>
      <p id="stepIndicator">Step 1 of 4</p>

      <form id="workflowForm">
        <section class="form-stage" id="stage1">
          <h3>Stage 1: Identity</h3>
          <input type="text" id="firstName" placeholder="First Name" required />
          <input type="text" id="lastName" placeholder="Last Name" required />
          <span class="error" id="error1"></span>
        </section>

        <section class="form-stage" id="stage2" style="display: none">
          <h3>Stage 2: Security</h3>
          <input type="email" id="email" placeholder="Email Address" required />
          <input
            type="password"
            id="password"
            placeholder="Create Password"
            required
          />
          <span class="error" id="error2"></span>
        </section>

        <section class="form-stage" id="stage3" style="display: none">
          <h3>Stage 3: Preferences</h3>
          <select id="theme">
            <option value="">Select Theme</option>
            <option value="light">Light Mode</option>
            <option value="dark">Dark Mode</option>
          </select>
          <label
            ><input type="checkbox" id="newsletter" /> Subscribe to
            Newsletter</label
          >
          <span class="error" id="error3"></span>
        </section>

        <section class="form-stage" id="stage4" style="display: none">
          <h3>Stage 4: Review & Confirm</h3>
          <div id="reviewSummary"></div>
          <span class="error" id="error4"></span>
        </section>

        <div class="nav-buttons">
          <button
            type="button"
            id="prevBtn"
            style="display: none"
            onclick="changeStep(-1)"
          >
            Previous
          </button>
          <button type="button" id="nextBtn" onclick="changeStep(1)">
            Next
          </button>
        </div>
      </form>
    </div>
    <script src="q5.js"></script>
  </body>
</html>
