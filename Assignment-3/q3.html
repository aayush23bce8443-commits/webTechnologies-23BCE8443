<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dynamic Survey Builder</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #f4f7f6;
        padding: 20px;
      }
      .survey-card {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      .question-block {
        margin-bottom: 25px;
        padding: 15px;
        border-radius: 8px;
        border: 1px solid #eee;
        transition: 0.3s;
      }
      .question-block.invalid {
        border-left: 5px solid #e74c3c;
        background: #fff5f5;
      }
      label {
        font-weight: 600;
        display: block;
        margin-bottom: 10px;
        color: #333;
      }
      .error-text {
        color: #e74c3c;
        font-size: 0.85rem;
        margin-top: 8px;
        display: none;
        font-weight: bold;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      .options-group label {
        font-weight: normal;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }
      button {
        background: #2ecc71;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        font-size: 1rem;
      }
      button:hover {
        background: #27ae60;
      }
    </style>
  </head>
  <body>
    <div class="survey-card">
      <h2>Customer Experience Survey</h2>
      <form id="surveyForm">
        <div id="surveyContainer"></div>
        <button type="submit">Complete Survey</button>
      </form>
    </div>
    <script src="q3.js"></script>
  </body>
</html>
