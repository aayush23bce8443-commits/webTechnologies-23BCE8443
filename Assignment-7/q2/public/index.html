<!doctype html>
<html>
  <head>
    <title>Online Book Finder</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f6f9;
        text-align: center;
      }

      .container {
        width: 70%;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
      }

      input {
        padding: 8px;
        margin: 5px;
        width: 200px;
      }

      button {
        padding: 8px 15px;
        margin: 5px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background: #0056b3;
      }

      .book {
        border: 1px solid #ddd;
        padding: 10px;
        margin: 10px;
        border-radius: 5px;
        background: #fafafa;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📚 Online Book Finder</h1>

      <h3>Search Book</h3>
      <input type="text" id="searchTitle" placeholder="Enter title" />
      <button onclick="searchBook()">Search</button>

      <h3>Filter by Category</h3>
      <input type="text" id="category" placeholder="Enter category" />
      <button onclick="filterCategory()">Filter</button>

      <h3>Sort Books</h3>
      <button onclick="sortPrice()">Sort by Price</button>
      <button onclick="sortRating()">Sort by Rating</button>

      <h3>Top Rated Books</h3>
      <button onclick="topBooks()">Show Top Books</button>

      <h3>Pagination</h3>
      <button onclick="loadBooks()">Load Books</button>
      <button onclick="nextPage()">Next Page</button>

      <div id="books"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
